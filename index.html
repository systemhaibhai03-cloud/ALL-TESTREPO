<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cute Lamp Login</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap");

  :root {
    --bg: #0a0a0c;
    --card: #16161a;
    --shade: #2b2b30;
    --shade-on: #3a3a32;
    --pole: #8a8a92;
    --cord: #6a6a72;
    --tongue: #ff8a5b;
    --accent: #f5a623;
    --text: #e8e8ec;
    --muted: #888;
    --light: #ffe9a8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  h1.page-title {
    color: var(--accent);
    font-size: clamp(1.8rem, 6vw, 2.6rem);
    font-weight: 700;
    margin-bottom: 10px;
    text-align: center;
  }

  /* ── Lamp Scene ── */
  .scene {
    position: relative;
    width: 280px;
    height: 300px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  /* Light glow when lamp is ON */
  .glow {
    position: absolute;
    top: 120px;
    left: 50%;
    transform: translateX(-50%);
    width: 320px;
    height: 320px;
    background: radial-gradient(ellipse at top, var(--light) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
    z-index: 0;
  }
  .lamp.on .glow { opacity: 0.35; }

  .lamp {
    position: relative;
    width: 220px;
    height: 290px;
    z-index: 1;
  }

  /* Lamp shade */
  .shade {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 170px;
    height: 110px;
    background: var(--shade);
    /* trapezoid */
    clip-path: polygon(18% 0, 82% 0, 100% 100%, 0 100%);
    transition: background 0.5s ease, transform 0.4s ease;
    z-index: 3;
  }
  .lamp.on .shade { background: var(--shade-on); }
  .lamp.sleeping .shade { transform: translateX(-50%) translateY(4px); }

  /* shade inner rim */
  .shade-rim {
    position: absolute;
    top: 135px;
    left: 50%;
    transform: translateX(-50%);
    width: 174px;
    height: 18px;
    background: #1f1f24;
    border-radius: 50%;
    z-index: 2;
  }
  .lamp.on .shade-rim { background: var(--light); box-shadow: 0 0 30px 6px var(--light); }

  /* Face on the shade */
  .face {
    position: absolute;
    top: 78px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 30px;
    z-index: 4;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 26px;
  }
  .eye {
    width: 18px;
    height: 18px;
    position: relative;
  }
  /* Open eye = filled curve; Closed eye = sleepy arc */
  .eye::before {
    content: '';
    position: absolute;
    inset: 0;
    border: 2.5px solid #111;
    border-radius: 50%;
    background: #111;
    transition: all 0.25s ease;
  }
  /* sleeping / password = closed arcs (⌒) */
  .lamp.sleeping .eye::before,
  .lamp.shy .eye::before {
    background: transparent;
    border-color: transparent;
    border-bottom: 3px solid #111;
    border-radius: 0 0 18px 18px;
    height: 10px;
    top: 5px;
  }

  /* Pole / stand */
  .pole {
    position: absolute;
    top: 145px;
    left: 50%;
    transform: translateX(-50%);
    width: 16px;
    height: 110px;
    background: linear-gradient(90deg, #6e6e76, var(--pole), #6e6e76);
    border-radius: 4px;
    z-index: 1;
  }
  .base {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 130px;
    height: 22px;
    background: linear-gradient(180deg, var(--pole), #6e6e76);
    border-radius: 50%;
    z-index: 1;
  }

  /* Pull cord */
  .cord {
    position: absolute;
    top: 110px;
    left: 38%;
    width: 2px;
    height: 70px;
    background: var(--cord);
    transform-origin: top center;
    z-index: 5;
    cursor: pointer;
    transition: height 0.15s ease;
  }
  .cord::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 12px;
    height: 12px;
    background: var(--tongue);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(255,138,91,0.5);
  }
  .cord.pulled { height: 88px; }

  .cord-hint {
    position: absolute;
    top: 185px;
    left: 30%;
    font-size: 0.65rem;
    color: var(--muted);
    z-index: 5;
    pointer-events: none;
    white-space: nowrap;
  }

  /* ── Login Card ── */
  .card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 18px;
    padding: 32px 30px;
    width: 340px;
    margin-top: 10px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }

  .card h2 {
    color: var(--text);
    text-align: center;
    font-size: 1.3rem;
    font-weight: 600;
    margin-bottom: 24px;
  }

  .field {
    position: relative;
    margin-bottom: 18px;
  }
  .field input {
    width: 100%;
    padding: 13px 44px 13px 16px;
    background: #1f1f24;
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: var(--text);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.25s;
  }
  .field input::placeholder { color: #666; }
  .field input:focus { border-color: var(--accent); }

  .toggle-pw {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
  }

  .login-btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #1a1a1a;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, filter 0.2s;
    margin-top: 6px;
  }
  .login-btn:hover { filter: brightness(1.08); }
  .login-btn:active { transform: translateY(2px); }

  .form-footer {
    margin-top: 1.5rem;
    text-align: center;
  }
  .forgot-link {
    color: #888;
    font-size: 0.9rem;
    text-decoration: none;
    transition: all 0.3s ease;
  }
  .forgot-link:hover { color: var(--accent); }

  @media (max-width: 420px) {
    .card { width: 92%; }
  }
</style>
</head>
<body>

  <h1 class="page-title">Cute Lamp Login</h1>

  <!-- Lamp -->
  <div class="scene">
    <div class="lamp" id="lamp">
      <div class="glow"></div>
      <div class="shade"></div>
      <div class="shade-rim"></div>
      <div class="face">
        <div class="eye"></div>
        <div class="eye"></div>
      </div>
      <div class="pole"></div>
      <div class="base"></div>
      <div class="cord" id="cord" title="Pull to toggle light"></div>
      <div class="cord-hint">↑ pull cord</div>
    </div>
  </div>

  <!-- Login Form -->
  <div class="card">
    <form id="loginForm">
      <h2>Welcome Back</h2>

      <div class="field">
        <input type="text" id="username" placeholder="Username" autocomplete="username" required>
      </div>

      <div class="field">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
        <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">👁</button>
      </div>

      <button type="submit" class="login-btn">Login</button>

      <div class="form-footer">
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
    </form>
  </div>

  <script>
    const lamp = document.getElementById('lamp');
    const cord = document.getElementById('cord');
    const username = document.getElementById('username');
    const password = document.getElementById('password');
    const togglePw = document.getElementById('togglePw');

    // Lamp starts sleeping (off, eyes closed)
    lamp.classList.add('sleeping');

    // Pull cord → toggle light on/off
    function pullCord() {
      cord.classList.add('pulled');
      setTimeout(() => cord.classList.remove('pulled'), 200);
      lamp.classList.toggle('on');
      // turning on wakes it up
      if (lamp.classList.contains('on')) {
        lamp.classList.remove('sleeping');
      }
    }
    cord.addEventListener('click', pullCord);

    // Username focus → wake up, eyes open
    username.addEventListener('focus', () => {
      lamp.classList.remove('sleeping', 'shy');
    });

    // Password focus → shy, close eyes (won't peek at password)
    password.addEventListener('focus', () => {
      lamp.classList.add('shy');
    });
    password.addEventListener('blur', () => {
      lamp.classList.remove('shy');
    });

    // When all fields empty & unfocused → go back to sleep
    function maybeSleep() {
      if (document.activeElement !== username && document.activeElement !== password) {
        if (!username.value && !password.value && !lamp.classList.contains('on')) {
          lamp.classList.add('sleeping');
        }
      }
    }
    username.addEventListener('blur', () => setTimeout(maybeSleep, 100));

    // Show / hide password
    togglePw.addEventListener('click', () => {
      if (password.type === 'password') {
        password.type = 'text';
        togglePw.textContent = '🙈';
        lamp.classList.remove('shy'); // peeking allowed when visible
      } else {
        password.type = 'password';
        togglePw.textContent = '👁';
        if (document.activeElement === password) lamp.classList.add('shy');
      }
    });

    // Submit
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('.login-btn');
      btn.textContent = 'Logging in...';
      lamp.classList.add('on');
      lamp.classList.remove('sleeping', 'shy');
      setTimeout(() => { btn.textContent = 'Login'; }, 1500);
    });
  </script>

</body>
</html>
