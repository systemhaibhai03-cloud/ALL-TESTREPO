<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cute Lamp Login</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap");

  :root {
    --bg: #07070a;
    --bg-lit: #1a1814;
    --card: #16161a;
    --shade: #2b2b30;
    --shade-on: #3a3a32;
    --pole: #8a8a92;
    --cord: #6a6a72;
    --tongue: #ff8a5b;
    --accent: #f5a623;
    --text: #e8e8ec;
    --muted: #888;
    --light: #ffe9a8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
    transition: background 0.7s ease;
  }
  /* Whole room brightens when lamp is on */
  body.lit { background: radial-gradient(circle at center 30%, var(--bg-lit), var(--bg)); }

  /* ── Lamp Scene ── */
  .scene {
    position: relative;
    width: 280px;
    height: 300px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 2;
  }

  .glow {
    position: absolute;
    top: 120px;
    left: 50%;
    transform: translateX(-50%);
    width: 340px;
    height: 340px;
    background: radial-gradient(ellipse at top, var(--light) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
    z-index: 0;
  }
  .lamp.on .glow { opacity: 0.4; }

  .lamp { position: relative; width: 220px; height: 290px; z-index: 1; }

  .shade {
    position: absolute;
    top: 30px; left: 50%;
    transform: translateX(-50%);
    width: 170px; height: 110px;
    background: var(--shade);
    clip-path: polygon(18% 0, 82% 0, 100% 100%, 0 100%);
    transition: background 0.5s ease, transform 0.4s ease;
    z-index: 3;
  }
  .lamp.on .shade { background: var(--shade-on); }
  .lamp.shy .shade { transform: translateX(-50%) translateY(4px); }

  .shade-rim {
    position: absolute;
    top: 135px; left: 50%;
    transform: translateX(-50%);
    width: 174px; height: 18px;
    background: #1f1f24;
    border-radius: 50%;
    z-index: 2;
    transition: all 0.5s ease;
  }
  .lamp.on .shade-rim { background: var(--light); box-shadow: 0 0 34px 8px var(--light); }

  .face {
    position: absolute;
    top: 78px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 30px;
    z-index: 4;
    display: flex; align-items: center; justify-content: center;
    gap: 26px;
  }
  .eye { width: 18px; height: 18px; position: relative; }
  .eye::before {
    content: '';
    position: absolute; inset: 0;
    border: 2.5px solid #111;
    border-radius: 50%;
    background: #111;
    transition: all 0.25s ease;
  }
  /* sleeping or shy = closed sleepy arcs */
  .lamp.sleeping .eye::before,
  .lamp.shy .eye::before {
    background: transparent;
    border-color: transparent;
    border-bottom: 3px solid #111;
    border-radius: 0 0 18px 18px;
    height: 10px; top: 5px;
  }

  .pole {
    position: absolute;
    top: 145px; left: 50%;
    transform: translateX(-50%);
    width: 16px; height: 110px;
    background: linear-gradient(90deg, #6e6e76, var(--pole), #6e6e76);
    border-radius: 4px;
    z-index: 1;
  }
  .base {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 130px; height: 22px;
    background: linear-gradient(180deg, var(--pole), #6e6e76);
    border-radius: 50%;
    z-index: 1;
  }

  /* Pull cord */
  .cord {
    position: absolute;
    top: 110px; left: 38%;
    width: 2px; height: 70px;
    background: var(--cord);
    transform-origin: top center;
    z-index: 5;
    cursor: pointer;
    transition: height 0.15s ease;
  }
  .cord::after {
    content: '';
    position: absolute;
    bottom: -8px; left: 50%;
    transform: translateX(-50%);
    width: 14px; height: 14px;
    background: var(--tongue);
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(255,138,91,0.6);
    animation: pulse 2s infinite ease-in-out;
  }
  .cord.pulled { height: 90px; }
  .lamp.on .cord::after { animation: none; }

  @keyframes pulse {
    0%, 100% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.25); }
  }

  .cord-hint {
    position: absolute;
    top: 188px; left: 24%;
    font-size: 0.72rem;
    color: var(--accent);
    z-index: 5;
    pointer-events: none;
    white-space: nowrap;
    animation: hintPulse 2s infinite;
  }
  .lamp.on .cord-hint { display: none; }
  @keyframes hintPulse { 0%,100%{opacity:0.5;} 50%{opacity:1;} }

  /* ── Login Card (hidden until light on) ── */
  .card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 18px;
    padding: 32px 30px;
    width: 340px;
    margin-top: 16px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    z-index: 2;

    /* hidden state */
    opacity: 0;
    transform: translateY(30px) scale(0.96);
    pointer-events: none;
    transition: opacity 0.6s ease 0.2s, transform 0.6s ease 0.2s;
  }
  .card.reveal {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  .card h2 {
    color: var(--text);
    text-align: center;
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .card .sub {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 24px;
  }

  .field { position: relative; margin-bottom: 18px; }
  .field input {
    width: 100%;
    padding: 13px 44px 13px 16px;
    background: #1f1f24;
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: var(--text);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.25s;
  }
  .field input::placeholder { color: #666; }
  .field input:focus { border-color: var(--accent); }

  .toggle-pw {
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
  }

  .login-btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #1a1a1a;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, filter 0.2s;
    margin-top: 6px;
  }
  .login-btn:hover { filter: brightness(1.08); }
  .login-btn:active { transform: translateY(2px); }

  .form-footer { margin-top: 1.5rem; text-align: center; }
  .forgot-link {
    color: #888;
    font-size: 0.9rem;
    text-decoration: none;
    transition: all 0.3s ease;
  }
  .forgot-link:hover { color: var(--accent); }

  @media (max-width: 420px) {
    .card { width: 92%; }
  }
</style>
</head>
<body>

  <!-- Lamp -->
  <div class="scene">
    <div class="lamp sleeping" id="lamp">
      <div class="glow"></div>
      <div class="shade"></div>
      <div class="shade-rim"></div>
      <div class="face">
        <div class="eye"></div>
        <div class="eye"></div>
      </div>
      <div class="pole"></div>
      <div class="base"></div>
      <div class="cord" id="cord" title="Pull to turn on the light"></div>
      <div class="cord-hint">↑ pull the wire</div>
    </div>
  </div>

  <!-- Login Form (revealed after pulling cord) -->
  <div class="card" id="card">
    <form id="loginForm">
      <h2>Welcome</h2>
      <p class="sub">Sign in to continue</p>

      <div class="field">
        <input type="text" id="username" placeholder="Username" autocomplete="username" required>
      </div>

      <div class="field">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
        <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">👁</button>
      </div>

      <button type="submit" class="login-btn">Login</button>

      <div class="form-footer">
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
    </form>
  </div>

  <script>
    const lamp = document.getElementById('lamp');
    const cord = document.getElementById('cord');
    const card = document.getElementById('card');
    const body = document.body;
    const username = document.getElementById('username');
    const password = document.getElementById('password');
    const togglePw = document.getElementById('togglePw');

    let isOn = false;

    // Pull the wire → turn light on/off + reveal/hide form
    function pullCord() {
      cord.classList.add('pulled');
      setTimeout(() => cord.classList.remove('pulled'), 200);

      isOn = !isOn;

      if (isOn) {
        // Light ON → wake lamp, brighten room, reveal welcome form
        lamp.classList.add('on');
        lamp.classList.remove('sleeping');
        body.classList.add('lit');
        card.classList.add('reveal');
      } else {
        // Light OFF → back to sleep, hide form
        lamp.classList.remove('on');
        lamp.classList.add('sleeping');
        body.classList.remove('lit');
        card.classList.remove('reveal');
        username.blur();
        password.blur();
      }
    }
    cord.addEventListener('click', pullCord);

    // Password focus → lamp shuts eyes (won't peek)
    password.addEventListener('focus', () => {
      if (isOn) lamp.classList.add('shy');
    });
    password.addEventListener('blur', () => lamp.classList.remove('shy'));

    username.addEventListener('focus', () => lamp.classList.remove('shy'));

    // Show / hide password
    togglePw.addEventListener('click', () => {
      if (password.type === 'password') {
        password.type = 'text';
        togglePw.textContent = '🙈';
        lamp.classList.remove('shy');
      } else {
        password.type = 'password';
        togglePw.textContent = '👁';
        if (document.activeElement === password) lamp.classList.add('shy');
      }
    });

    // Submit
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('.login-btn');
      btn.textContent = 'Logging in...';
      lamp.classList.remove('shy');
      setTimeout(() => { btn.textContent = 'Login'; }, 1500);
    });
  </script>

</body>
</html>
